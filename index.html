<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopicKly</title>
    <script>
      (function () {
        const theme = localStorage.getItem("chetrend-theme") || "dark";
        const palette = localStorage.getItem("chetrend-palette") || "default";
        const authState = localStorage.getItem("chetrend-auth-demo") === "true" ? "logged-in" : "logged-out";
        const mobile = typeof window.matchMedia === "function"
          ? window.matchMedia("(max-width: 960px)").matches
          : window.innerWidth <= 960;
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.palette = palette;
        document.documentElement.dataset.authState = authState;
        document.documentElement.classList.toggle("is-mobile-viewport", mobile);
        document.documentElement.classList.toggle("is-desktop-viewport", !mobile);
      })();
    </script>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar" role="banner">
        <div class="topbar__group topbar__group--left">
          <button class="icon-button" id="profileButton" type="button" aria-label="Perfil" data-auth-private>
            <span class="profile-button__avatar" aria-hidden="true">
              <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="4" width="40" height="40" rx="10"></rect>
                <circle cx="24" cy="18" r="7"></circle>
                <path d="M11.5 38c2.6-6.2 7.7-9.3 12.5-9.3S33.9 31.8 36.5 38"></path>
              </svg>
            </span>
            <span class="button-label">Perfil</span>
          </button>
          <button class="icon-button" id="paletteButton" type="button" aria-label="Paletas" aria-haspopup="dialog" aria-controls="paletteModal" aria-expanded="false">
            <span class="icon-button__icon" aria-hidden="true">
              <span class="palette-mark" aria-hidden="true">
                <span class="palette-mark__swatch palette-mark__swatch--one"></span>
                <span class="palette-mark__swatch palette-mark__swatch--two"></span>
                <span class="palette-mark__swatch palette-mark__swatch--three"></span>
              </span>
            </span>
            <span class="theme-toggle__label">Paletas</span>
          </button>
          <div class="theme-toggle-slot theme-toggle-slot--desktop" id="themeToggleDesktopSlot"></div>
        </div>

        <div class="topbar__title" aria-label="TopicKly">
          <span class="brand-mark__icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none">
              <rect class="brand-mark__icon-base" width="64" height="64" rx="16"></rect>
              <path class="brand-mark__icon-fill" d="M17 19h30v18c0 5.5-4.5 10-10 10H27c-5.5 0-10-4.5-10-10V19Z"></path>
              <path class="brand-mark__icon-stroke" d="M44 23h4.2c2.7 0 4.8 2.1 4.8 4.8s-2.1 4.8-4.8 4.8H44"></path>
              <path class="brand-mark__icon-stroke" d="M22 48h20"></path>
              <path class="brand-mark__icon-stroke" d="M26 14v7M32 11v10M38 14v7"></path>
            </svg>
          </span>
          <span class="brand-mark" aria-hidden="true">
            <span class="brand-mark__che">TOPIC</span>
            <span class="brand-mark__trend">KLY</span>
          </span>
        </div>

        <div class="topbar__group topbar__group--right">
          <div class="topbar__auth-tools" id="authTools" data-auth-private hidden>
            <button class="icon-button icon-button--circular" id="friendRequestsButton" type="button" aria-label="Solicitudes de amistad">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <line x1="19" y1="8" x2="19" y2="14"></line>
                  <line x1="16" y1="11" x2="22" y2="11"></line>
                </svg>
              </span>
            </button>
            <button class="icon-button icon-button--circular" id="messagesButton" type="button" aria-label="Mensajes">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
              </span>
            </button>
            <button class="icon-button icon-button--circular" id="notificationsButton" type="button" aria-label="Notificaciones">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
              </span>
            </button>
          </div>
          <button class="text-button text-button--prominent" id="storeButton" type="button" aria-label="Tienda" data-auth-private>
            <span class="icon-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 9h14l-1 11H6L5 9Z"></path>
                <path d="M9 9V7a3 3 0 0 1 6 0v2"></path>
              </svg>
            </span>
            <span class="button-label">Tienda</span>
          </button>
          <div class="theme-toggle-slot theme-toggle-slot--mobile" id="themeToggleMobileSlot"></div>
          <button class="text-button text-button--accent prominent-auth" id="authButton" type="button" aria-label="Iniciar sesión">
            <span class="button-label">Iniciar sesión</span>
          </button>
          <button class="icon-button icon-button--drawer mobile-right-drawer" id="openRightDrawer" type="button" aria-label="Abrir menu" aria-controls="rightDrawer" aria-expanded="false">
            <span class="icon-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </span>
          </button>
        </div>
        <template id="themeToggleTemplate">
          <button class="theme-switch" id="themeToggle" type="button" role="switch" aria-checked="true" aria-label="Tema oscuro">
            <span class="theme-switch__track" aria-hidden="true">
              <span class="theme-switch__icons">
                <span class="theme-switch__icon theme-switch__icon--light">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3.5"></circle>
                    <path d="M12 3.5v2.2M12 18.3v2.2M20.5 12h-2.2M5.7 12H3.5M18 6l-1.6 1.6M7.6 16.4L6 18M18 18l-1.6-1.6M7.6 7.6L6 6"></path>
                  </svg>
                </span>
                <span class="theme-switch__icon theme-switch__icon--dark">
                  <svg viewBox="0 0 24 24" fill="none" stroke="none">
                    <path fill="currentColor" d="M20 14.2A8.5 8.5 0 1 1 9.8 4a7 7 0 0 0 10.2 10.2Z"></path>
                  </svg>
                </span>
              </span>
              <span class="theme-switch__thumb"></span>
            </span>
          </button>
        </template>
        <script>
          (function () {
            const template = document.getElementById("themeToggleTemplate");
            const targetSlot = document.documentElement.classList.contains("is-mobile-viewport")
              ? document.getElementById("themeToggleMobileSlot")
              : document.getElementById("themeToggleDesktopSlot");
            if (template instanceof HTMLTemplateElement && targetSlot && !targetSlot.firstElementChild) {
              targetSlot.appendChild(template.content.cloneNode(true));
            }
            const themeToggle = targetSlot?.querySelector?.("#themeToggle");
            if (themeToggle instanceof HTMLButtonElement) {
              const isDark = document.documentElement.dataset.theme !== "light";
              themeToggle.setAttribute("aria-checked", String(isDark));
              themeToggle.setAttribute("title", isDark ? "Cambiar a tema claro" : "Cambiar a tema oscuro");
            }
          })();
        </script>
      </header>

      <main class="workspace" aria-label="Chat social">
        <section class="panel panel--topics" aria-label="Temas">
          <div class="topics-panel__body">
            <div class="topics-panel__list-frame">
              <div class="mobile-topic-stage">
                <div class="mobile-topic-stage__view mobile-topic-stage__view--list">
                  <div class="scroll-list" id="topicList"></div>
                </div>
              </div>
            </div>
            <div class="topics-panel__footer">
              <button class="primary-button topics-panel__create-button" id="createTopicButton" type="button">
                Crear nuevo tema
              </button>
            </div>
          </div>
        </section>

        <section class="panel panel--chat" aria-labelledby="chatTitle">
          <div class="panel__header panel__header--chat">
            <div class="panel__header-title">
              <button class="icon-button icon-button--circular chat-header__back" id="backToTopics" type="button" aria-label="Volver a temas">
                <span class="icon-button__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"></path>
                  </svg>
                </span>
              </button>
              <h2 id="chatTitle">Chat principal</h2>
            </div>
            <div class="chat-actions">
              <button class="icon-button icon-button--compact icon-button--refresh" id="refreshButton" type="button" aria-label="Actualizar contenido manualmente">
                <span class="icon-button__icon" aria-hidden="true">
                  <svg class="refresh-button__wheel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19.9 13a8 8 0 1 1-9.9-8.8c3.9-1 7.9 1 9.4 4.7"></path>
                    <path d="M20 4v5h-5"></path>
                  </svg>
                </span>
                <span>Actualizar</span>
              </button>
            </div>
          </div>

          <div class="chat-hero">
            <h3 id="chatTopicName" hidden>Selecciona un tema</h3>
            <p class="chat-hero__description" id="chatTopicDescription" hidden>Selecciona un tema para empezar a chatear.</p>
          </div>

          <div class="message-stream" id="messageStream" aria-live="polite"></div>

          <form class="composer" id="messageForm">
            <label class="composer__field" hidden>
              <input id="topicTitleInput" type="text" maxlength="80" placeholder="Título" autocomplete="off" aria-label="Título del tema" />
            </label>
            <label class="composer__field">
              <textarea id="messageInput" rows="2" maxlength="240" placeholder="Escribe aquí..." required aria-label="Mensaje"></textarea>
            </label>
            <button class="primary-button" type="submit">Enviar</button>
          </form>
        </section>

        <section class="panel panel--users-rankings" aria-labelledby="communityTitle">
          <div class="panel__header panel__header--users-rankings">
            <div class="community-header">
              <div class="panel__title-inline">
                <h2 id="communityTitle">Comunidad</h2>
              </div>
            </div>
          </div>
          <div class="panel__body panel__body--users-rankings">
            <div class="users-section">
              <div class="section-title panel__title-inline">
                <span class="section-title__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
                    <path d="M6 20a6 6 0 0 1 12 0"></path>
                  </svg>
                </span>
                <h3>Usuarios conectados</h3>
              </div>
              <div class="scroll-list" id="userList"></div>
            </div>
            <div class="rankings-section">
              <div class="section-title section-title--ranking">
                <div class="panel__title-inline panel__title-inline--ranking">
                  <span class="panel__title-glyph" id="rankingsGlyph" aria-hidden="true"></span>
                  <h3 id="rankingsTitle">Ranking</h3>
                </div>
                <div class="rankings-legacy" hidden>
                  <button class="icon-button icon-button--drawer ranking-scope-toggle" id="rankingScopeButton" type="button" aria-label="Cambiar entre ranking global y por tema">
                    <span class="icon-button__icon" aria-hidden="true" id="rankingScopeIcon"></span>
                  </button>
                </div>
              </div>
              <div class="ranking-controls">
                <div class="ranking-scope-tabs" id="rankingScopeTabs" role="group" aria-label="Alcance del ranking">
                  <button class="ranking-scope-tabs__button" type="button" data-ranking-scope="global">GLOBAL</button>
                  <span class="ranking-scope-tabs__divider" aria-hidden="true">/</span>
                  <button class="ranking-scope-tabs__button" type="button" data-ranking-scope="topic">TEMA</button>
                </div>
                <div class="ranking-mode-list" id="rankingModeList" role="group" aria-label="Modo de ranking"></div>
              </div>
              <div class="ranking-carousel" aria-label="Cambiar ranking">
                <button class="icon-button icon-button--compact ranking-carousel__nav" id="rankingPrev" type="button" aria-label="Ranking anterior">
                  <span class="icon-button__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="m15 18-6-6 6-6"></path>
                    </svg>
                  </span>
                </button>
                <button class="icon-button icon-button--compact ranking-carousel__current" id="rankingCurrent" type="button" aria-label="Modo actual">
                  <span class="button-label">TEMA COMENTARIOS</span>
                </button>
                <button class="icon-button icon-button--compact ranking-carousel__nav" id="rankingNext" type="button" aria-label="Ranking siguiente">
                  <span class="icon-button__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="m9 18 6-6-6-6"></path>
                    </svg>
                  </span>
                </button>
              </div>
              <div class="ranking-content">
                <div class="scroll-list" id="rankingList"></div>
                <div class="panel__empty" id="rankingsEmpty" hidden></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="palette-modal-backdrop" id="paletteModalBackdrop" hidden>
      <section class="palette-modal" id="paletteModal" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Selector de paletas" tabindex="-1">
        <div class="palette-modal__header">
          <button class="icon-button icon-button--compact palette-modal__close" id="closePaletteModalButton" type="button" aria-label="Cerrar selector de paletas">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="palette-modal__body">
          <div class="palette-grid" id="paletteOptionGrid"></div>
        </div>
      </section>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

    <aside class="drawer drawer--left" id="leftDrawer" role="dialog" aria-modal="true" aria-label="Temas" aria-hidden="true" hidden>
      <div class="drawer__header">
        <div>
          <p class="panel__kicker">Menú</p>
          <h2>Temas</h2>
        </div>
        <button class="icon-button icon-button--compact" data-close-drawer="left" type="button" aria-label="Cerrar temas">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="scroll-list" id="leftDrawerTopics"></div>
    </aside>

    <aside class="drawer drawer--right" id="rightDrawer" role="dialog" aria-modal="true" aria-label="Menu movil" aria-hidden="true" hidden>
      <div class="drawer__header">
        <div class="drawer__brand" aria-hidden="true">
          <span class="brand-mark__icon drawer__brand-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none">
              <rect class="brand-mark__icon-base" width="64" height="64" rx="16"></rect>
              <path class="brand-mark__icon-fill" d="M17 19h30v18c0 5.5-4.5 10-10 10H27c-5.5 0-10-4.5-10-10V19Z"></path>
              <path class="brand-mark__icon-stroke" d="M44 23h4.2c2.7 0 4.8 2.1 4.8 4.8s-2.1 4.8-4.8 4.8H44"></path>
              <path class="brand-mark__icon-stroke" d="M22 48h20"></path>
              <path class="brand-mark__icon-stroke" d="M26 14v7M32 11v10M38 14v7"></path>
            </svg>
          </span>
          <span class="brand-mark">
            <span class="brand-mark__che">TOPIC</span><span class="brand-mark__trend">KLY</span>
          </span>
        </div>
        <button class="icon-button icon-button--compact" data-close-drawer="right" type="button" aria-label="Cerrar menu">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <section class="drawer__section drawer__section--menu" id="mobileTopbarMenu" aria-label="Acciones secundarias">
          <div class="drawer-search">
            <label class="drawer-search__field" for="mobileDrawerSearch">
              <span class="drawer-search__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="6.5"></circle>
                  <path d="m16 16 4 4"></path>
                </svg>
              </span>
              <input class="drawer-search__input" id="mobileDrawerSearch" type="text" inputmode="search" enterkeyhint="search" placeholder="Buscar en menu" autocomplete="off" spellcheck="false" />
            </label>
          </div>
          <div class="drawer-action-stack">
            <button class="drawer-action-button" type="button" data-mobile-topbar-action="profile" data-auth-private>
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="8" r="3.5"></circle>
                  <path d="M5 19c1.8-4.1 4.8-6.1 7-6.1s5.2 2 7 6.1"></path>
                </svg>
              </span>
              <span class="drawer-action-button__label">Perfil</span>
            </button>
            <button class="drawer-action-button" type="button" data-mobile-topbar-action="home">
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square" stroke-linejoin="miter">
                  <path d="M3.5 11.5 12 4l8.5 7.5"></path>
                  <path d="M6.5 10.5V20h11v-9.5"></path>
                  <path d="M10 20v-5.5h4V20"></path>
                </svg>
              </span>
              <span class="drawer-action-button__label">Inicio</span>
            </button>
            <button class="drawer-action-button" type="button" data-mobile-topbar-action="palette">
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 4.5c-4.7 0-8.5 3.4-8.5 7.7S7.3 20 12 20h1.1c1.2 0 2-.9 2-2 0-.8-.4-1.4-.4-2 0-.8.6-1.4 1.5-1.4H17c2 0 3.5-1.6 3.5-3.6 0-3.5-3.6-6.5-8.5-6.5Z"></path>
                  <circle cx="8" cy="11" r="1"></circle>
                  <circle cx="11.5" cy="8.5" r="1"></circle>
                  <circle cx="15.5" cy="9.5" r="1"></circle>
                </svg>
              </span>
              <span class="drawer-action-button__label">Paletas</span>
            </button>
            <button class="drawer-action-button" type="button" data-mobile-drawer-panel="users" aria-pressed="false">
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square" stroke-linejoin="miter">
                  <circle cx="12" cy="8" r="2.25"></circle>
                  <circle cx="6.25" cy="9.25" r="1.75"></circle>
                  <circle cx="17.75" cy="9.25" r="1.75"></circle>
                  <path d="M8.5 18.5v-.75c0-1.5 1.25-2.75 2.75-2.75h1.5c1.5 0 2.75 1.25 2.75 2.75v.75"></path>
                  <path d="M3.75 18.5V18c0-1.4 1.1-2.5 2.5-2.5H7"></path>
                  <path d="M17 15.5h.75c1.4 0 2.5 1.1 2.5 2.5v.5"></path>
                </svg>
              </span>
              <span class="drawer-action-button__label">Usuarios</span>
            </button>
            <button class="drawer-action-button" type="button" data-mobile-drawer-panel="ranking" aria-pressed="false">
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square" stroke-linejoin="miter">
                  <path d="M4 19.5h16"></path>
                  <path d="M5.5 16.5 10 12l3.25 3.25L18.5 10"></path>
                  <path d="M14.5 10h4v4"></path>
                </svg>
              </span>
              <span class="drawer-action-button__label">Ranking</span>
            </button>
            <button class="drawer-action-button drawer-action-button--auth" type="button" data-mobile-topbar-action="auth" data-auth-private>
              <span class="drawer-action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 6H6.5v12H10"></path>
                  <path d="M13 8.5 17 12l-4 3.5"></path>
                  <path d="M9 12h8"></path>
                </svg>
              </span>
              <span class="drawer-action-button__label">Cerrar sesión</span>
            </button>
          </div>
      </section>
      <div class="drawer-mobile-panels" id="mobileDrawerPanels" hidden>
      <section class="drawer__section drawer__section--half drawer__section--mobile-panel" id="drawerUsersSection" hidden>
        <h3>Usuarios activos</h3>
        <div class="drawer-mobile-panel__header">
          <button class="drawer-mobile-panel__back" type="button" data-mobile-drawer-back aria-label="Volver al menu">
            <span class="drawer-mobile-panel__back-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"></path>
              </svg>
            </span>
          </button>
          <h3>Usuarios activos</h3>
        </div>
        <div class="scroll-list" id="drawerUserList"></div>
      </section>
      <section class="drawer__section drawer__section--half drawer__section--mobile-panel" id="drawerRankingsSection" hidden>
        <div class="drawer-ranking__header">
          <button class="drawer-mobile-panel__back" type="button" data-mobile-drawer-back aria-label="Volver al menu">
            <span class="drawer-mobile-panel__back-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"></path>
              </svg>
            </span>
          </button>
          <div class="panel__title-inline panel__title-inline--ranking">
            <span class="panel__title-glyph" id="drawerRankingsGlyph" aria-hidden="true"></span>
            <h3 id="drawerRankingsTitle">Ranking</h3>
          </div>
        </div>
        <div class="panel__body panel__body--drawer-rankings">
          <div class="ranking-controls ranking-controls--drawer">
            <div class="ranking-scope-tabs" id="drawerRankingScopeTabs" role="group" aria-label="Alcance del ranking">
              <button class="ranking-scope-tabs__button" type="button" data-ranking-scope="global">GLOBAL</button>
              <span class="ranking-scope-tabs__divider" aria-hidden="true">/</span>
              <button class="ranking-scope-tabs__button" type="button" data-ranking-scope="topic">TEMA</button>
            </div>
          </div>
          <div class="drawer-ranking__switch">
            <button class="icon-button icon-button--compact ranking-carousel__nav" id="drawerRankingPrev" type="button" aria-label="Ranking anterior">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m15 18-6-6 6-6"></path>
                </svg>
              </span>
            </button>
            <button class="icon-button icon-button--compact ranking-carousel__current" id="drawerRankingCurrent" type="button" aria-label="Modo actual">
              <span class="button-label">TEMA COMENTARIOS</span>
            </button>
            <button class="icon-button icon-button--compact ranking-carousel__nav" id="drawerRankingNext" type="button" aria-label="Ranking siguiente">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m9 18 6-6-6-6"></path>
                </svg>
              </span>
            </button>
          </div>
          <div class="drawer-ranking-content">
            <div class="scroll-list" id="drawerRankingList"></div>
            <div class="panel__empty panel__empty--drawer" id="drawerRankingsEmpty" hidden></div>
          </div>
        </div>
      </section>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
